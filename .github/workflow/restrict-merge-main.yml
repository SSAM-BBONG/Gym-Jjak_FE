name: Restrict merge to main

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          if [[ "$GITHUB_HEAD_REF" != "develop" ]]; then
            echo "❌ main 브랜치는 develop에서만 PR할 수 있습니다."
            exit 1
          fi