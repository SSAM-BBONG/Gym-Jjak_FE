language: "ko-KR"

tone_instructions: >
  모든 리뷰 코멘트, PR 요약, 개선 제안은 반드시 한국어로 작성한다.
  영어 사용은 코드, 라이브러리명, 에러 메시지, 기술 용어에 한정한다.
  간결하고 단호하지만 예의바르게 리뷰한다.
  사용자 경험 저하, 성능 문제, 보안 취약점, 상태 관리 문제를 우선 지적한다.
  단순 스타일 지적보다 아키텍처, 렌더링 전략, 데이터 흐름, 접근성, 유지보수성을 우선한다.
  지적 시 반드시 사유와 권장 대안을 함께 제시한다.

reviews:
  profile: "assertive"
  high_level_summary: true
  poem: false
  review_status: false

  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "draft"

  path_filters:
    - "src/**"
    - "public/**"
    - ".github/**"
    - "next.config.*"
    - "package.json"
    - "package-lock.json"
    - "pnpm-lock.yaml"
    - "yarn.lock"
    - "middleware.ts"
    - "!node_modules/**"
    - "!.next/**"
    - "!coverage/**"
    - "!dist/**"
    - "!build/**"

  path_instructions:
    - path: "src/**"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - Next.js App Router 규칙을 준수하는지 확인한다.
        - Server Component와 Client Component 책임이 명확히 분리되어 있는지 확인한다.
        - 불필요한 "use client" 사용으로 번들 크기와 hydration 비용이 증가하지 않는지 확인한다.
        - Server Component에서 useState, useEffect, window, document, localStorage 같은 클라이언트 전용 기능을 사용하지 않는지 확인한다.
        - dynamic rendering이 불필요하게 발생하지 않는지 확인한다.
        - 쿠키 기반 인증 구조를 우회할 수 없는지 확인한다.
        - API 호출 로직이 중복되지 않는지 확인한다.
        - 민감정보가 클라이언트 번들, 로그, 응답 데이터에 노출되지 않는지 확인한다.
        - 모바일 환경에서 레이아웃 깨짐 가능성을 확인한다.
        - 접근성(a11y), 키보드 접근성, semantic HTML 사용 여부를 확인한다.
        - 번들 크기를 증가시키는 불필요한 라이브러리 사용 여부를 확인한다.

    - path: "src/app/**"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - page.tsx, layout.tsx, loading.tsx, error.tsx, not-found.tsx 역할이 적절히 분리되어 있는지 확인한다.
        - metadata, generateStaticParams, revalidate 설정이 적절한지 확인한다.
        - revalidatePath, revalidateTag 사용 위치와 범위가 적절한지 확인한다.
        - SSR, SSG, ISR 선택이 페이지 목적에 맞는지 확인한다.
        - 불필요한 동적 렌더링을 유발하는 cookies(), headers(), searchParams 사용이 있는지 확인한다.
        - 서버 컴포넌트에서 클라이언트 컴포넌트로 전달하는 props가 직렬화 가능한 값인지 확인한다.
        - Suspense 또는 Streaming 적용 가능성이 있는지 검토한다.

    - path: "src/components/**"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - 컴포넌트 책임이 과도하지 않은지 확인한다.
        - Props Drilling이 심하지 않은지 확인한다.
        - 재사용 가능한 컴포넌트로 분리 가능한지 검토한다.
        - 불필요한 useState가 존재하지 않는지 확인한다.
        - 조건부 렌더링이 안전하게 처리되는지 확인한다.
        - button, input, label, form, aria-label 등 접근성 요소가 적절한지 확인한다.
        - div에 onClick을 직접 사용하는 경우 button으로 대체 가능한지 확인한다.

    - path: "src/feature/**"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - Feature 단위 구조가 적절한지 확인한다.
        - UI, service, type, hook 책임이 분리되어 있는지 확인한다.
        - Feature 간 의존성이 과도하지 않은지 확인한다.
        - 도메인별 API 호출과 UI 로직이 과도하게 섞이지 않았는지 확인한다.
        - feature 내부 컴포넌트가 공용 컴포넌트로 분리되어야 하는지 검토한다.

    - path: "src/features/**"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - Feature 단위 구조가 적절한지 확인한다.
        - UI, service, type, hook 책임이 분리되어 있는지 확인한다.
        - Feature 간 의존성이 과도하지 않은지 확인한다.
        - 도메인별 API 호출과 UI 로직이 과도하게 섞이지 않았는지 확인한다.

    - path: "src/service/**"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - API 호출 로직이 일관되게 관리되는지 확인한다.
        - fetch, axios 사용 방식이 혼재되어 유지보수성을 해치지 않는지 확인한다.
        - 중복된 API 호출 코드가 존재하는지 확인한다.
        - 공통 에러 처리 전략이 존재하는지 확인한다.
        - 401, 403, 500 등 주요 에러 처리 흐름이 누락되지 않았는지 확인한다.
        - 인증 토큰 처리 방식이 안전한지 확인한다.
        - 민감정보가 클라이언트에 노출되지 않는지 확인한다.
        - API 응답 타입과 실제 사용 타입이 일치하는지 확인한다.

    - path: "src/hooks/**"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - 훅의 책임이 명확한지 확인한다.
        - useEffect 의존성 배열이 올바른지 확인한다.
        - useEffect 남용 여부를 확인한다.
        - 메모리 누수 가능성을 확인한다.
        - 커스텀 훅으로 추출 가능한 중복 로직을 확인한다.
        - 불필요한 re-render를 유발하지 않는지 확인한다.

    - path: "src/store/**"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - 전역 상태가 필요한 데이터인지 확인한다.
        - 불필요하게 전역 상태를 사용하지 않는지 확인한다.
        - 서버 상태와 클라이언트 상태를 중복 저장하지 않는지 확인한다.
        - 상태 변경 흐름이 예측 가능한지 확인한다.
        - 새로고침 시 유지되어야 하는 상태와 휘발되어야 하는 상태가 구분되어 있는지 확인한다.

    - path: "src/types/**"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - any 사용 여부를 확인한다.
        - API request/response 타입이 명확하게 정의되어 있는지 확인한다.
        - 중복 타입 정의 여부를 확인한다.
        - 불필요한 type assertion을 확인한다.
        - nullable 값 처리가 안전한지 확인한다.

    - path: "src/utils/**"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - 순수 함수로 유지되는지 확인한다.
        - 부수 효과가 존재하지 않는지 확인한다.
        - 중복 유틸 함수 여부를 확인한다.
        - 함수명이 역할을 명확하게 표현하는지 확인한다.
        - 날짜, 금액, 전화번호 등 포맷팅 로직이 일관되게 관리되는지 확인한다.

    - path: "**/*.tsx"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - map 렌더링 시 key 누락 또는 부적절한 key 사용 여부를 확인한다.
        - 불필요한 re-render 가능성을 확인한다.
        - inline function 남용 여부를 확인한다.
        - useMemo, useCallback, React.memo가 필요한 상황인지 검토한다.
        - 조건부 렌더링이 안전하게 처리되는지 확인한다.
        - 접근성(a11y)을 확인한다.
        - 이미지 최적화(next/image) 여부를 확인한다.
        - SVG, PNG, JPG 사용 목적이 적절한지 확인한다.
        - Tailwind class가 과도하게 길어져 가독성을 해치지 않는지 확인한다.
        - 반응형 디자인이 깨질 가능성을 확인한다.

    - path: "**/*.ts"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - any 사용을 지양한다.
        - 타입 안정성을 우선 검토한다.
        - 불필요한 type assertion(as)을 확인한다.
        - nullable 처리 누락 여부를 확인한다.
        - 중복 로직을 확인한다.
        - 매직 넘버와 매직 스트링을 상수화할 수 있는지 확인한다.
        - 함수의 입력과 반환 타입이 명확한지 확인한다.

    - path: "**/middleware.ts"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - 인증 로직 우회를 허용하지 않는지 확인한다.
        - 쿠키 기반 인증이 안전하게 처리되는지 확인한다.
        - 불필요한 리다이렉트가 발생하지 않는지 확인한다.
        - matcher 범위가 적절한지 확인한다.
        - 로그인 사용자와 비로그인 사용자 접근 제어가 명확한지 확인한다.
        - 무한 리다이렉트 가능성이 없는지 확인한다.

    - path: "public/**"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - 불필요하게 큰 이미지 파일이 포함되지 않았는지 확인한다.
        - 사용하지 않는 정적 파일이 포함되지 않았는지 확인한다.
        - 이미지 파일명이 역할을 명확하게 표현하는지 확인한다.
        - SVG 사용 시 보안상 위험한 스크립트가 포함되지 않았는지 확인한다.

    - path: "package.json"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - 사용하지 않는 라이브러리를 확인한다.
        - 번들 크기에 영향을 주는 의존성을 확인한다.
        - 보안 취약점 가능성이 있는 라이브러리를 확인한다.
        - scripts 명령어가 프로젝트 목적에 맞는지 확인한다.
        - dependencies와 devDependencies 구분이 적절한지 확인한다.

    - path: "next.config.*"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - 이미지 최적화 설정을 확인한다.
        - 외부 이미지 도메인 설정이 과도하게 열려 있지 않은지 확인한다.
        - 실험 기능 사용 시 안정성을 검토한다.
        - 번들 분석 설정 여부를 확인한다.
        - 보안 헤더 설정 가능성을 검토한다.

    - path: ".github/**"
      instructions: |
        - 모든 리뷰 코멘트는 한국어로 작성한다.
        - PR 템플릿 체크리스트가 실효성 있는지 확인한다.
        - 이슈 템플릿이 실제 협업 흐름에 맞는지 확인한다.
        - 브랜치 전략과 충돌하지 않는지 확인한다.
        - GitHub Actions에 Secret 노출 위험이 없는지 확인한다.
        - main/develop 브랜치 보호 정책과 충돌하지 않는지 확인한다.
        - 한글 인코딩 깨짐이 없는지 확인한다.